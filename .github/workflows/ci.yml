name: CI

# BatchTranslate CI（架构第 1、3 节）。
# 对应 issue TRA-14：在 PR/push 上跑 install + lint + typecheck + vitest，
# 作为小队规则「PR 必须过 Vitest 纯函数测试」的强制手段。
# e2e（需 Chrome + Playwright 持久化 context 加载 MV3 扩展）暂不纳入，后续单独加 job。
on:
  push:
    branches: [main]
  pull_request:

# 取消同一 PR 上未完成的旧运行，避免并发浪费。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + Typecheck + Vitest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (Vitest)
        run: pnpm test
